<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Game - Thần Tốc HSK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-fixed">
        <div class="profile">
            <div class="avatar">👤</div>
            <div class="info">
                <h3 id="playerName">Damon</h3>
                <p id="playerAge">23 tuổi</p>
            </div>
            <div class="player-status">
                <div id="currentHSK">HSK 4</div>
                <div id="playerRank">Đồng</div>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div id="setupScreen" class="setup-card">
            
            <div class="setup-header">
                <h2 class="setup-title">⚡ THẦN TỐC HSK</h2>
                <p class="setup-subtitle">Tùy chỉnh thông số bài luyện tập phản xạ</p>
            </div>

            <div class="setup-group">
                <div class="setup-label">📌 Phạm vi từ vựng:</div>
                <div class="hsk-range-row">
                    <select id="startHskSelect" onchange="checkGameHsk()">
                        <option value="1">HSK 1</option>
                        <option value="2">HSK 2</option>
                        <option value="3">HSK 3</option>
                        <option value="4">HSK 4</option>
                        <option value="5">HSK 5</option>
                        <option value="6">HSK 6</option>
                    </select>
                    <span class="range-separator">đến</span>
                    <select id="endHskSelect" onchange="checkGameHsk()">
                        <option value="1">HSK 1</option>
                        <option value="2">HSK 2</option>
                        <option value="3">HSK 3</option>
                        <option value="4">HSK 4</option>
                        <option value="5">HSK 5</option>
                        <option value="6">HSK 6</option>
                    </select>
                </div>
            </div>

            <div class="setup-group">
                <div class="setup-label">🔢 Số lượng câu hỏi:</div>
                <input type="number" id="questionCount" class="setup-input-full" min="10" max="100" step="10" value="10">
            </div>

            <div class="setup-group">
                <div class="setup-label">⚙️ Chế độ chơi:</div>
                <div class="mode-grid">
                    
                    <div id="easyModeCard" class="mode-card easy-card" onclick="selectGameMode('easy')">
                        <h4>🟢 DỄ</h4>
                        <p>Tổng thời gian</p>
                        <select id="easyTimeSelect" onclick="event.stopPropagation()"></select>
                    </div>
                    
                    <div id="hardModeCard" class="mode-card hard-card" onclick="selectGameMode('hard')">
                        <h4>🔴 KHÓ</h4>
                        <p>Thời gian / câu</p>
                        <select id="hardTimeSelect" onclick="event.stopPropagation()">
                            <option value="7">7 giây / câu</option>
                            <option value="5" selected>5 giây / câu</option>
                            <option value="3">3 giây / câu</option>
                        </select>
                    </div>

                </div>
            </div>

            <button class="btn-start-game" onclick="startSpeedGame()">🚀 BẮT ĐẦU CHƠI</button>
        </div>

        <div id="playScreen" class="game-play-box" style="display: none;">
            <h3 id="progressText" style="color: #888;">Câu 1/10</h3>
            
            <div class="timer-bar-container">
                <div id="timerFill" class="timer-bar-fill"></div>
            </div>
            
            <p id="timerText" style="font-weight: bold; color: #f44336;">0:00</p>
            
            <h1 id="questionHanzi" class="hanzi-display">汉字</h1>
            
            <div id="optionsGrid" class="options-grid">
                </div>
        </div>

        <div id="resultScreen" class="game-play-box" style="display: none; padding: 35px 20px;">
            <h2 style="font-size: 28px; color: #333;">🎉 HOÀN THÀNH!</h2>
            <p style="color: #666; margin-top: 8px;">Điểm số của bạn:</p>
            <h1 id="scoreText" style="color: #4caf50; font-size: 55px; margin: 15px 0 25px 0;">10/10</h1>
            
            <button class="btn-game-action btn-replay" onclick="resetSpeedGame()">
                🔄 CHƠI LẠI
            </button>
            <button class="btn-game-action btn-leave" onclick="leaveGame()">
                🚪 RỜI GAME
            </button>
        </div>

    </div>

    <div class="footer">
        <a href="index.html" class="nav-btn">
            <span class="icon">🏠</span>
            Trang chủ
        </a>
        
        <a href="index.html" class="logo-btn">
            <img src="pic/logo.png" alt="Logo">
        </a>

        <a href="setting.html" class="nav-btn">
            <span class="icon">⚙️</span>
            Cài đặt
        </a>
    </div>

    <script src="game.js"></script>
</body>
</html>
