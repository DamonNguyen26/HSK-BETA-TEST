<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Game - Trang Chủ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-fixed">
        <div class="profile">
            <div class="avatar">👤</div>
            <div class="info">
                <h3 id="playerName">Damon</h3>
                <p id="playerAge">23 tuổi</p>
            </div>
            <div class="player-status">
                <div id="currentHSK">HSK 4</div>
                <div id="playerRank">Đồng</div>

        </div>
    </div>

    <div class="container">
        <a href="gamecenter.html" class="card blue">
            🎮 MINI GAME HSK
            <span>Học mà chơi</span>
        </a>

        <a href="vocab.html" class="card orange">
            📚 TỪ VỰNG
            <span>HSK 1 - HSK 6</span>
        </a>

        <a href="gramma.html" class="card green">
            📝 NGỮ PHÁP
            <span>Cấu trúc ngữ pháp</span>
        </a>

        <a href="review.html" class="card purple">
            📖 ÔN TẬP
            <span>Từ cần luyện lại</span>
        </a>
    </div>

    <div class="footer">
        <a href="index.html" class="nav-btn active">
            <span class="icon">🏠</span>
            Trang chủ
        </a>
        
        <a href="about.html" class="logo-btn">
            <img src="pic/logo.png" alt="Logo">
        </a>

        <a href="setting.html" class="nav-btn">
            <span class="icon">⚙️</span>
            Cài đặt
        </a>
    </div>

    <script src="game.js"></script>
</body>
</html>
