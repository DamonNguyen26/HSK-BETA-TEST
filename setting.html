<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cài đặt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="profile">
        <div class="avatar">👤</div>
        <div class="info">
            <h3 id="playerName">Damon Nguyen</h3>
            <p id="playerAge">18 tuổi</p>
        </div>
        <div class="player-status">
            <div id="currentHSK">HSK 1</div>
            <div id="playerRank">Đồng</div>
        </div>
    </div>

    <div class="setting-box">
        <h2>⚙️ CÀI ĐẶT</h2>
        
        <label>Tên hiển thị</label>
        <input type="text" id="nameInput">

        <label>Tuổi</label>
        <input type="number" id="ageInput">

        <label>HSK hiện tại</label>
        <select id="hskSelect">
            <option value="HSK 1">HSK 1</option>
            <option value="HSK 2">HSK 2</option>
            <option value="HSK 3">HSK 3</option>
            <option value="HSK 4">HSK 4</option>
            <option value="HSK 5">HSK 5</option>
            <option value="HSK 6">HSK 6</option>
        </select>

        <button onclick="saveSetting()">💾 Lưu cài đặt</button>
    </div>
</div>

<div class="footer">
    <div class="nav-btn" onclick="location.href='index.html'">
        🏠<br>Trang chủ
    </div>
    <div class="nav-btn logo-btn" onclick="location.href='about.html'">
        <img src="pic/logo.png">
    </div>
    <div class="nav-btn active" onclick="location.href='setting.html'">
        ⚙️<br>Cài đặt
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
