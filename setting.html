<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Game - Cài Đặt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-fixed">
        <div class="profile">
            <div class="avatar">👤</div>
            <div class="info">
                <h3 id="playerName">Damon</h3>
                <p id="playerAge">23 tuổi</p>
            </div>
            <div class="player-status">
                <div id="currentHSK">HSK 4</div>
                <div id="playerRank">Đồng</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="setting-card">
            <h2 class="setting-title">⚙️ CÀI ĐẶT TÀI KHOẢN</h2>

            <div class="setting-group">
                <label for="nameInput">👤 Tên người chơi:</label>
                <input type="text" id="nameInput" placeholder="Nhập tên của bạn">
            </div>

            <div class="setting-group">
                <label for="ageInput">🎂 Tuổi:</label>
                <input type="number" id="ageInput" placeholder="Nhập tuổi" min="1" max="100">
            </div>

            <div class="setting-group">
                <label for="hskSelect">🎓 Trình độ HSK hiện tại:</label>
                <select id="hskSelect">
                    <option value="HSK 1">HSK 1</option>
                    <option value="HSK 2">HSK 2</option>
                    <option value="HSK 3">HSK 3</option>
                    <option value="HSK 4">HSK 4</option>
                    <option value="HSK 5">HSK 5</option>
                    <option value="HSK 6">HSK 6</option>
                </select>
            </div>

            <button class="btn-save-setting" onclick="saveSetting()">💾 LƯU CÀI ĐẶT</button>

            <a href="about.html" class="btn-about-link">ℹ️ Giới thiệu ứng dụng & Thông tin</a>
        </div>
    </div>

    <div class="footer">
        <a href="index.html" class="nav-btn">
            <span class="icon">🏠</span>
            Trang chủ
        </a>
        
        <a href="index.html" class="logo-btn">
            <img src="pic/logo.png" alt="Logo">
        </a>

        <a href="setting.html" class="nav-btn active">
            <span class="icon">⚙️</span>
            Cài đặt
        </a>
    </div>

    <script src="game.js"></script>
</body>
</html>
